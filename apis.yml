name: Liberty Interactive
description: >-
  Liberty Interactive Corporation owned and operated a broad range of video and
  online commerce companies, including QVC, HSN, and zulily, before being
  reorganized into Qurate Retail Group in 2018. The corporation tracked
  separate operating units through Liberty Interactive Group and Liberty
  Ventures Group tracking stocks.
